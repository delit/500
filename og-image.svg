<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0c1929"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#a6c9f8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="220" fill="#2563eb" opacity="0.08"/>
  <circle cx="180" cy="520" r="280" fill="#38bdf8" opacity="0.06"/>
  <text x="600" y="268" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="112" font-weight="800" letter-spacing="-0.04em" fill="url(#title)" filter="url(#glow)">1 to 500</text>
  <text x="600" y="338" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="34" font-weight="600" fill="#94a3b8" letter-spacing="0.12em">NUMBER ORDERING PUZZLE</text>
  <text x="600" y="412" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="26" fill="#64748b">10 draws - Strictly ascending - Browser</text>
  <g opacity="0.9" transform="translate(420 470)">
    <rect x="0" y="0" width="72" height="56" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <rect x="88" y="0" width="72" height="56" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <rect x="176" y="0" width="72" height="56" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <rect x="264" y="0" width="72" height="56" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  </g>
</svg>
